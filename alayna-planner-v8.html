<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alayna's planner v8</title>
  <meta name="theme-color" content="#4a8a5a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/theme.css">
  <link rel="stylesheet" href="./src/styles/layout.css">
  <link rel="stylesheet" href="./src/styles/components.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <h1>alayna's dashboard</h1>
      <p id="todayLabel"></p>
    </div>
    <nav id="mainNav" class="main-nav">
      <button class="nav-btn active" data-view="today">Today</button>
      <button class="nav-btn" data-view="weekly">Weekly</button>
      <button class="nav-btn" data-view="areas">Areas</button>
      <button class="nav-btn" data-view="timeline">Timeline</button>
      <button class="nav-btn" data-view="settings">Settings</button>
    </nav>
    <div class="sidebar-footer">
      <button id="focusModeBtn" class="ghost-btn">Focus mode</button>
      <div class="muted" id="syncStatusLabel">Calendar disconnected</div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <form id="quickCaptureForm" class="quick-capture" autocomplete="off">
        <input id="quickCaptureInput" type="text" placeholder="Quick capture...">
        <button type="submit" class="primary-btn">Add</button>
      </form>
      <div class="topbar-actions">
        <button id="openInboxBtn" class="ghost-btn">Inbox</button>
        <button id="exportBtn" class="ghost-btn">Export</button>
        <label class="file-btn ghost-btn">
          Import
          <input id="importInput" type="file" accept="application/json" hidden>
        </label>
      </div>
    </header>

    <section id="view-today" class="view active"></section>
    <section id="view-weekly" class="view"></section>
    <section id="view-areas" class="view"></section>
    <section id="view-timeline" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
  <script src="./src/app/state.js"></script>
  <script src="./src/app/tasks.js"></script>
  <script src="./src/app/filters.js"></script>
  <script src="./src/app/weekly.js"></script>
  <script src="./src/app/calendar.js"></script>
  <script src="./src/app/views/today.js"></script>
  <script src="./src/app/views/weekly.js"></script>
  <script src="./src/app/views/areas.js"></script>
  <script src="./src/app/views/timeline.js"></script>
  <script src="./src/app/views/quick-capture.js"></script>
  <script src="./src/app/main.js"></script>
</body>
</html>
